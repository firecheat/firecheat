<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حکیم ناصر علی - ہربل بک</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

    <style>
    /* 🔥 ALVI NASTALEEQ FONT ADDED */
    @font-face {
      font-family: 'Alvi Nastaleeq';
      src: url('fonts/alvi-nastaleeq.ttf') format('truetype');
    }

    body { font-family: 'Alvi Nastaleeq', system-ui; }

    .horizontal-scroll { overflow-x: auto; scrollbar-width: none; }
    .horizontal-scroll::-webkit-scrollbar { display: none; }
    .card { transition: transform 0.3s; }
    .card:hover { transform: scale(1.05); }
    .nav-active { color: #76C043 !important; }
  </style>
</head>

<body class="bg-[#F4F6F9] min-h-screen pb-24">

  <!-- Background -->
  <div class="relative">
 

    <!-- ⭐ TOP BAR (USER + SEARCH INLINE FIX) -->
    <div class="absolute top-4 left-4 right-4 flex justify-between items-center gap-2">

      <!-- USER COUNTER -->
      <div class="bg-white/80 px-4 py-2 rounded-2xl shadow font-bold text-sm whitespace-nowrap" id="userCounter">
        Book-Users: 0
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="p-1 min-h-[calc(100vh-300px)]"></div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-[#F1F8E9] shadow-2xl py-3 border-t">
    <div class="flex justify-around max-w-md mx-auto">

      <div onclick="loadPage('home')" class="flex flex-col items-center cursor-pointer nav-item nav-active" id="nav-home">
        <img src="assets/ic_home.png" class="w-7 h-7">
        <span class="text-xs mt-1">Home</span>
      </div>

      <div onclick="loadPage('nuskha')" class="flex flex-col items-center cursor-pointer nav-item" id="nav-nuskha">
        <img src="assets/ic_nuskha.png" class="w-7 h-7">
        <span class="text-xs mt-1">Nuskha</span>
      </div>

      <div onclick="loadPage('category')" class="flex flex-col items-center cursor-pointer nav-item" id="nav-category">
        <img src="assets/ic_category.png" class="w-7 h-7">
        <span class="text-xs mt-1">Category</span>
      </div>

      <div onclick="loadPage('favorite')" class="flex flex-col items-center cursor-pointer nav-item" id="nav-favorite">
        <img src="assets/ic_favorite.png" class="w-7 h-7">
        <span class="text-xs mt-1">Favorite</span>
      </div>

      <div onclick="loadPage('about')" class="flex flex-col items-center cursor-pointer nav-item" id="nav-about">
        <img src="assets/ic_about.png" class="w-7 h-7">
        <span class="text-xs mt-1">About</span>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
  <script src="js/nuskha.js"></script>
  <script src="js/favorite.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/about.js"></script>

</body>
</html>
